name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Genera version.js automatico
        run: |
          VERSION="1.0.${{ github.run_number }}"
          DATE=$(date +'%Y-%m-%d')
          echo "// AUTO-GENERATED - non modificare manualmente" > version.js
          echo "const APP_VERSION = \"$VERSION\";" >> version.js
          echo "const APP_VERSION_DATE = \"$DATE\";" >> version.js
          echo "Versione generata: $VERSION del $DATE"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
